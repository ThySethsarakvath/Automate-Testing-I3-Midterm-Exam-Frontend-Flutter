name: CI – Flutter Tests & Notify

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Flutter Integration Tests
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java (required for Android SDK tools) ───────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Setup Flutter ─────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      # ── 4. Install dependencies ──────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 5. Analyze code ──────────────────────────────────────────────────
      - name: Analyze code
        id: analyze
        run: flutter analyze
        continue-on-error: true

      # ── 6. Run unit/widget tests ─────────────────────────────────────────
      - name: Run unit & widget tests
        id: unit_tests
        run: flutter test
        continue-on-error: true

      # ── 7. Start NestJS backend ──────────────────────────────────────────
      - name: Set up Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      # ── 7. Start NestJS backend ──────────────────────────────────────────
      - name: Set up Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Clone & start backend API
        id: backend
        run: |
          git clone https://github.com/${{ secrets.BACKEND_REPO }}.git backend
          cd backend

          # Install all deps normally (no --ignore-scripts so tsc works)
          npm install

          # Build — fail loudly if it errors
          node node_modules/@nestjs/cli/bin/nest.js build
          
          # 🎯 Verify dist was actually created at the correct path
          if [ ! -f dist/src/main.js ]; then
            echo "❌ Build failed — dist/src/main.js not found"
            exit 1
          fi
          echo "✅ Build succeeded"

          # 🎯 Start in background using the correct path
          nohup node dist/src/main.js > ../backend.log 2>&1 &

          # Poll until API responds (max 60s)
          echo "Waiting for API to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000/posts > /dev/null; then
              echo "✅ API is ready after ${i} attempts"
              break
            fi
            echo "Attempt $i — not ready, waiting 2s..."
            sleep 2
          done

          # Final check — print logs if still not up
          if ! curl -sf http://localhost:3000/posts > /dev/null; then
            echo "❌ API failed to start. Full logs:"
            cat ../backend.log
            exit 1
          fi
        continue-on-error: true

      # ── 8. Enable KVM ─────────────────────────────────────────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 9. Integration tests on Android emulator ──────────────────────────
      # 10.0.2.2 is the emulator's alias for the host machine (where API runs)
      - name: Run integration tests (Android)
        id: integration_tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_5
          script: >
            flutter test integration_test/app_test.dart
            -d emulator-5554
            --dart-define=API_BASE_URL=http://10.0.2.2:3000
        continue-on-error: true

      # ── 10. Upload coverage report ───────────────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: coverage/
          retention-days: 14

      # ── 11. Determine overall result ─────────────────────────────────────
      - name: Determine result
        id: result
        run: |
          if [[ "${{ steps.unit_tests.outcome }}"        == "success" && \
                "${{ steps.integration_tests.outcome }}" == "success" ]]; then
            echo "status=SUCCESS ✅" >> $GITHUB_OUTPUT
            echo "emoji=✅"         >> $GITHUB_OUTPUT
          else
            echo "status=FAILED ❌" >> $GITHUB_OUTPUT
            echo "emoji=❌"         >> $GITHUB_OUTPUT
          fi

      # ── 12. Send email notification ──────────────────────────────────────
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ github.event.pusher.email }}, srengty@gmail.com
          from: "Social Media Flutter CI <${{ secrets.MAIL_USERNAME }}>"
          subject: >
            ${{ steps.result.outputs.emoji }} Flutter CI [${{ steps.result.outputs.status }}]
            – social-media-flutter @ ${{ github.ref_name }}
            (#${{ github.run_number }})
          body: |
            ═══════════════════════════════════════════════════
            Social Media Flutter — Automated Test Report
            ═══════════════════════════════════════════════════

            Overall Result : ${{ steps.result.outputs.status }}
            Branch         : ${{ github.ref_name }}
            Commit         : ${{ github.sha }}
            Commit message : ${{ github.event.head_commit.message }}
            Committer      : ${{ github.event.pusher.name }} <${{ github.event.pusher.email }}>
            Run number     : #${{ github.run_number }}

            ───────────────────────────────────────────────────
            Step Results
            ───────────────────────────────────────────────────
            Code Analysis      : ${{ steps.analyze.outcome }}
            Unit/Widget Tests  : ${{ steps.unit_tests.outcome }}
            Backend Startup    : ${{ steps.backend.outcome }}
            Integration Tests  : ${{ steps.integration_tests.outcome }}

            ───────────────────────────────────────────────────
            Links
            ───────────────────────────────────────────────────
            Actions run : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Repository  : ${{ github.server_url }}/${{ github.repository }}

            ═══════════════════════════════════════════════════
            This is an automated message — do not reply.
            ═══════════════════════════════════════════════════

      # ── 13. Fail job if critical steps failed ────────────────────────────
      - name: Fail if tests failed
        if: |
          steps.unit_tests.outcome == 'failure' ||
          steps.integration_tests.outcome == 'failure'
        run: |
          echo "❌ One or more test suites failed."
          exit 1