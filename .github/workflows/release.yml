name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true

permissions:
  contents: write

jobs:
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF/refs\/tags\//}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## Changes in this Release
            - See commit history for details
            
            ## Installation
            - Download APK from Assets section below
            - Or build from source: `flutter build apk --release`
          draft: false
          prerelease: false

  build_and_upload:
    name: Build and Upload Artifacts
    needs: create_release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Build App Bundle
        run: flutter build appbundle --release
      
      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: ./build/app/outputs/flutter-apk/app-release.apk
          asset_name: midterm-exam-task2-${{ needs.create_release.outputs.version }}.apk
          asset_content_type: application/vnd.android.package-archive
      
      - name: Upload App Bundle to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: ./build/app/outputs/bundle/release/app-release.aab
          asset_name: midterm-exam-task2-${{ needs.create_release.outputs.version }}.aab
          asset_content_type: application/octet-stream

  deploy_to_play_store:
    name: Deploy to Google Play Store
    needs: create_release
    runs-on: ubuntu-latest
    if: false  # Disabled by default - enable when ready with signing keys
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Decode Android Keystore
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore/upload-keystore.jks
      
      - name: Build App Bundle
        run: |
          flutter build appbundle --release \
            --build-name="${{ needs.create_release.outputs.version }}" \
            --build-number="$GITHUB_RUN_NUMBER"
        env:
          KEYSTORE_PATH: android/app/keystore/upload-keystore.jks
          KEY_ALIAS: upload
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      
      - name: Deploy to Google Play Store
        uses: r0adkll/upload-google-play@v1.1.1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.example.midterm_exam_task2
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  deploy_to_app_store:
    name: Deploy to Apple App Store
    needs: create_release
    runs-on: macos-latest
    if: false  # Disabled by default - enable when ready with certificates
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Build iOS
        run: |
          flutter build ios --release \
            --build-name="${{ needs.create_release.outputs.version }}" \
            --build-number="$GITHUB_RUN_NUMBER"
      
      - name: Deploy to App Store (requires fastlane and credentials)
        run: |
          echo "This step requires fastlane setup and Apple credentials"
          echo "Setup fastlane in ios/ directory:"
          echo "  fastlane init"
          echo "  fastlane deliver --beta"
