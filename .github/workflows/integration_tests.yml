name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  integration_tests_android:
    name: Integration Tests - Android
    runs-on: macos-latest
    
    strategy:
      matrix:
        api-level: [28, 31]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Launch Android Emulator and run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            flutter test integration_test/auth_test.dart -v
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-android-api${{ matrix.api-level }}
          path: |
            test-results/
          retention-days: 7

  integration_tests_ios:
    name: Integration Tests - iOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Start iOS Simulator
        run: |
          open -a Simulator.app
          xcrun simctl boot "iPhone 14"
      
      - name: Run iOS integration tests
        run: flutter test integration_test/auth_test.dart -d "iPhone 14" -v
        continue-on-error: true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-ios
          path: |
            test-results/
          retention-days: 7
